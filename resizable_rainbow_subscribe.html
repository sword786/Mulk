
<style>
  @property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }
  @keyframes spin {
    to { --angle: 360deg; }
  }
  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    gap: 24px;
    padding: 2rem;
  }
  .resize-container {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    resize: both;
    overflow: hidden;
    min-width: 120px;
    min-height: 36px;
    max-width: 600px;
    max-height: 200px;
    width: 160px;
    height: 50px;
    border-radius: 999px;
  }
  .resize-container::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 999px;
    padding: 3px;
    background: conic-gradient(from var(--angle), #ff0000, #ff6600, #ffff00, #00ee00, #0099ff, #cc00ff, #ff0099, #ff0000);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    animation: spin 2s linear infinite;
    pointer-events: none;
  }
  .sub-btn {
    background: transparent;
    border: none;
    font-family: sans-serif;
    font-weight: 600;
    color: var(--color-text-primary);
    cursor: default;
    white-space: nowrap;
    font-size: clamp(10px, 2.5vw, 22px);
    padding: 0 16px;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hint {
    font-size: 12px;
    color: var(--color-text-secondary);
    font-family: sans-serif;
  }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .ctrl-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .ctrl-label {
    font-size: 11px;
    color: var(--color-text-secondary);
    font-family: sans-serif;
  }
  input[type=range] { width: 120px; }
</style>

<div class="page">
  <div class="resize-container" id="box">
    <button class="sub-btn" id="btn">Subscribe</button>
  </div>

  <div class="hint">↔ Drag the corner handle to resize freely</div>

  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Width</span>
      <input type="range" min="120" max="560" value="160" id="wSlider" step="1">
      <span class="ctrl-label" id="wVal">160px</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Height</span>
      <input type="range" min="36" max="180" value="50" id="hSlider" step="1">
      <span class="ctrl-label" id="hVal">50px</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Border thickness</span>
      <input type="range" min="2" max="12" value="3" id="bSlider" step="1">
      <span class="ctrl-label" id="bVal">3px</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Speed</span>
      <input type="range" min="5" max="50" value="20" id="sSlider" step="1">
      <span class="ctrl-label" id="sVal">2.0s</span>
    </div>
  </div>
</div>

<script>
  const box = document.getElementById('box');
  const btn = document.getElementById('btn');
  const wSlider = document.getElementById('wSlider');
  const hSlider = document.getElementById('hSlider');
  const bSlider = document.getElementById('bSlider');
  const sSlider = document.getElementById('sSlider');

  function updateBorder() {
    const b = bSlider.value;
    box.style.setProperty('--pad', b + 'px');
    const style = box.querySelector('style') || document.createElement('style');
    box.style.cssText += '';
    document.getElementById('bVal').textContent = b + 'px';
    setBorder(b);
  }

  function setBorder(b) {
    const existing = document.getElementById('dynamic-style');
    if (existing) existing.remove();
    const s = document.createElement('style');
    s.id = 'dynamic-style';
    s.textContent = `.resize-container::before { padding: ${b}px !important; }`;
    document.head.appendChild(s);
  }

  function setSpeed(v) {
    const secs = (v / 10).toFixed(1);
    document.getElementById('sVal').textContent = secs + 's';
    const existing = document.getElementById('speed-style');
    if (existing) existing.remove();
    const s = document.createElement('style');
    s.id = 'speed-style';
    s.textContent = `@keyframes spin { to { --angle: 360deg; } } .resize-container::before { animation-duration: ${secs}s !important; }`;
    document.head.appendChild(s);
  }

  wSlider.addEventListener('input', () => {
    box.style.width = wSlider.value + 'px';
    document.getElementById('wVal').textContent = wSlider.value + 'px';
  });

  hSlider.addEventListener('input', () => {
    box.style.height = hSlider.value + 'px';
    document.getElementById('hVal').textContent = hSlider.value + 'px';
  });

  bSlider.addEventListener('input', updateBorder);
  sSlider.addEventListener('input', () => setSpeed(sSlider.value));

  new ResizeObserver(entries => {
    for (const e of entries) {
      const w = Math.round(e.contentRect.width);
      const h = Math.round(e.contentRect.height);
      wSlider.value = Math.min(560, Math.max(120, w));
      hSlider.value = Math.min(180, Math.max(36, h));
      document.getElementById('wVal').textContent = w + 'px';
      document.getElementById('hVal').textContent = h + 'px';
    }
  }).observe(box);
</script>
