<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Mulk Loop Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;700&family=Inter:wght@400;600&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1920px;
            background-color: #070B19; color: #FFFFFF;
            font-family: 'Inter', sans-serif; overflow: hidden;
            position: relative; transform-origin: top left;
        }

        @media (max-width: 1080px) {
            body {
                width: 100vw; height: calc(100vw * (1920/1080));
                font-size: calc(100vw / 1080 * 16px);
            }
        }

        .background-effects {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(212, 175, 55, 0.15) 0%, rgba(7, 11, 25, 1) 70%);
            z-index: 1;
        }
        
        .stars {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)), radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0));
            background-repeat: repeat; background-size: 250px 250px; opacity: 0.3; z-index: 2;
        }

        .safe-zone {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 12% 8% 25% 8%; display: flex; flex-direction: column;
            justify-content: space-between; z-index: 10;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 40px;
        }

        .gold-text { color: #D4AF37; }

        .verse-content {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; gap: 40px; text-align: center;
            transition: opacity 0.4s ease-in-out;
        }

        .arabic-text { font-family: 'Amiri', serif; font-size: 68px; direction: rtl; line-height: 1.6; }
        .urdu-text { font-family: 'Noto Nastaliq Urdu', serif; font-size: 36px; direction: rtl; line-height: 2.2; color: #e0e0e0; }
        .english-text { font-size: 28px; font-style: italic; line-height: 1.4; color: #b0b0b0; }
        .ayah-label { font-family: 'Cinzel', serif; font-size: 22px; color: #D4AF37; letter-spacing: 4px; }

        #interaction-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #070B19; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .start-btn {
            background: #D4AF37; color: #000; padding: 25px 60px;
            border-radius: 50px; font-size: 32px; font-weight: 800;
            cursor: pointer; border: none; font-family: 'Cinzel', serif;
        }

        .progress-bar-bg { width: 100%; height: 20px; background: #222; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 85.6%; background: linear-gradient(90deg, #FF0000, #D4AF37); }
    </style>
</head>
<body>

    <div id="interaction-overlay">
        <div style="font-family: 'Amiri', serif; font-size: 60px; margin-bottom: 20px; color: #fff;">سورة الملك</div>
        <button class="start-btn" onclick="startStream()">START INFINITE LOOP</button>
    </div>

    <div class="background-effects"></div>
    <div class="stars"></div>

    <!-- ADDED: 'loop' attribute ensures the audio restarts automatically -->
    <audio id="quranAudio" src="surah.m4a" preload="auto" loop></audio>

    <div class="safe-zone">
        <div class="header">
            <div style="display: flex; justify-content: space-between; font-size: 28px; font-weight: 600;">
                <div id="live-clock" class="gold-text">00:00:00</div>
                <div style="color: red; display: flex; align-items: center; gap: 10px;">
                    <span style="width: 15px; height: 15px; background: red; border-radius: 50%;"></span> LIVE
                </div>
            </div>
            <div style="text-align: center; margin-top: 30px;">
                <h1 style="font-family: 'Cinzel'; letter-spacing: 10px; font-size: 40px;">SURAH AL-MULK</h1>
            </div>
        </div>

        <div class="glass-panel" style="flex-grow: 1; margin: 40px 0; display: flex; flex-direction: column;">
            <div id="verse-container" class="verse-content">
                <div id="ayahNumber" class="ayah-label">READY</div>
                <div id="arabicText" class="arabic-text">القرآن الكريم</div>
                <div id="urduText" class="urdu-text">اردو ترجمہ</div>
                <div id="englishText" class="english-text">Starting recitation...</div>
            </div>
        </div>

        <div class="footer">
            <div style="text-align: center; margin-bottom: 30px; font-size: 24px;">
                🔴 <span class="gold-text">856</span>/1,000 Subscribers
                <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
            </div>
            <div class="glass-panel" style="padding: 20px; text-align: center; font-size: 32px; font-weight: 600;">
                Type <span class="gold-text">Alhamdulillah</span> ✨
            </div>
        </div>
    </div>

    <script>
        const surahAlMulk = [
            { ayah: 1, startTime: 0, arabic: "تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيرٌ", english: "Blessed is He in whose hand is dominion, and He is over all things competent.", urdu: "بڑی برکت والا ہے وہ جس کے ہاتھ میں بادشاہی ہے اور وہ ہر چیز پر قادر ہے۔" },
            { ayah: 2, startTime: 11, arabic: "الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلًا ۚ وَهُوَ الْعَزِيزُ الْغَفُورُ", english: "[He] who created death and life to test you [as to] which of you is best in deed - and He is the Exalted in Might, the Forgiving.", urdu: "جس نے موت اور زندگی کو پیدا کیا تاکہ تمہیں آزمائے کہ تم میں سے کون اچھے عمل کرتا ہے، اور وہ زبردست بخشنے والا ہے۔" },
            { ayah: 3, startTime: 21, arabic: "الَّذِي خَلَقَ سَبْعَ سَمَاوَاتٍ طِبَاقًا ۖ مَّا تَرَىٰ فِي خَلْقِ الرَّحْمَٰنِ مِن تَفَاوُتٍ ۖ فَارْجِعِ الْبَصَرَ هَلْ تَرَىٰ مِن فُطُورٍ", english: "[And] who created seven heavens in layers. You do not see in the creation of the Most Merciful any inconsistency. So return [your] vision [to the sky]; do you see any breaks?", urdu: "جس نے سات آسمان اوپر تلے بنائے۔ تو رحمن کی پیدائش میں کوئی بے ضابطگی نہیں دیکھے گا۔ پھر نگاہ دوڑا، کیا تجھے کوئی شگاف نظر آتا ہے؟" },
            { ayah: 4, startTime: 34, arabic: "ثُمَّ ارْجِعِ الْبَصَرَ كَرَّتَيْنِ يَنقَلِبْ إِلَيْكَ الْبَصَرُ خَاسِئًا وَهُوَ حَسِيرٌ", english: "Then return [your] vision twice again. [Your] vision will return to you humbled while it is fatigued.", urdu: "پھر بار بار نگاہ دوڑا، تیری نگاہ تیری طرف ذلیل و خوار ہو کر لوٹ آئے گی اور وہ تھکی ہوئی ہوگی۔" },
            { ayah: 5, startTime: 42, arabic: "وَلَقَدْ زَيَّنَّا السَّمَاءَ الدُّنْيَا بِمَصَابِيحَ وَجَعَلْنَاهَا رُجُومًا لِّلشَّيَاطِينِ ۖ وَأَعْتَدْنَا لَهُمْ عَذَابَ السَّعِيرِ", english: "And We have certainly beautified the nearest heaven with stars and have made [from] them what is thrown at the devils and have prepared for them the punishment of the Blaze.", urdu: "اور ہم نے قریب کے آسمان کو چراغوں (تاروں) سے زینت دی اور انہیں شیطانوں کے مارنے کا آلہ بنایا اور ان کے لیے دہکتی آگ کا عذاب تیار کر رکھا ہے۔" },
            { ayah: 6, startTime: 55, arabic: "وَلِلَّذِينَ كَفَرُوا بِرَبِّهِمْ عَذَابُ جَهَنَّمَ ۖ وَبِئْسَ الْمَصِيرُ", english: "And for those who disbelieved in their Lord is the punishment of Hell, and wretched is the destination.", urdu: "اور جن لوگوں نے اپنے رب کا انکار کیا ان کے لیے جہنم کا عذاب ہے، اور وہ بہت برا ٹھکانا ہے۔" },
            { ayah: 7, startTime: 62, arabic: "إِذَا أُلْقُوا فِيهَا سَمِعُوا لَهَا شَهِيقًا وَهِيَ تَفُورُ", english: "When they are thrown into it, they hear from it a [dreadful] inhaling while it boils up.", urdu: "جب وہ اس میں ڈالے جائیں گے تو اس کی چنگھاڑ سنیں گے اور وہ جوش مار رہی ہوگی۔" },
            { ayah: 8, startTime: 68, arabic: "تَكَادُ تَمَيَّزُ مِنَ الْغَيْظِ ۖ كُلَّمَا أُلْقِيَ فِيهَا فَوْجٌ سَأَلَهُمْ خَزَنَتُهَا أَلَمْ يَأْتِكُمْ نَذِيرٌ", english: "It almost bursts with rage. Every time a company is thrown into it, its keepers ask them, 'Did there not come to you a warner?'", urdu: "قریب ہے کہ غصے سے پھٹ جائے۔ جب بھی کوئی گروہ اس میں ڈالا جائے گا تو اس کے داروغہ ان سے پوچھیں گے: کیا تمہارے پاس کوئی ڈرانے والا نہیں آیا تھا؟" },
            { ayah: 9, startTime: 80, arabic: "قَالُوا بَلَىٰ قَدْ جَاءَنَا نَذِيرٌ فَكَذَّبْنَا وَقُلْنَا مَا نَزَّلَ اللَّهُ مِن شَيْءٍ إِنْ أَنتُمْ إِلَّا فِي ضَلَالٍ كَبِيرٍ", english: "They will say, 'Yes, a warner had come to us, but we denied and said, 'Allah has not sent down anything. You are not but in great error.'", urdu: "وہ کہیں گے: کیوں نہیں، بے شک ہمارے پاس ڈرانے والا آیا تھا، لیکن ہم نے جھٹلا دیا اور کہا کہ اللہ نے کچھ بھی نازل نہیں کیا، تم تو بس ایک بڑی گمراہی میں ہو۔" },
            { ayah: 10, startTime: 96, arabic: "وَقَالُوا لَوْ كُنَّا نَسْمَعُ أَوْ نَعْقِلُ مَا كُنَّا فِي أَصْحَابِ السَّعِيرِ", english: "And they will say, 'If only we had been listening or reasoning, we would not be among the companions of the Blaze.'", urdu: "اور کہیں گے: اگر ہم سنتے یا سمجھتے تو ہم اس بھڑکتی آگ والوں میں نہ ہوتے۔" },
            { ayah: 11, startTime: 104, arabic: "فَاعْتَرَفُوا بِذَنبِهِمْ فَسُحْقًا لِّأَصْحَابِ السَّعِيرِ", english: "And they will admit their sin, so [it is] alienation for the companions of the Blaze.", urdu: "پس وہ اپنے گناہ کا اعتراف کر لیں گے، تو دوری ہے بھڑکتی آگ والوں کے لیے۔" },
            { ayah: 12, startTime: 110, arabic: "إِنَّ الَّذِينَ يَخْشَوْنَ رَبَّهُم بِالْغَيْبِ لَهُم مَّغْفِرَةٌ وَأَجْرٌ كَبِيرٌ", english: "Indeed, those who fear their Lord unseen will have forgiveness and great reward.", urdu: "بے شک جو لوگ بن دیکھے اپنے رب سے ڈرتے ہیں، ان کے لیے بخشش اور بہت بڑا اجر ہے۔" },
            { ayah: 13, startTime: 119, arabic: "وَأَسِرُّوا قَوْلَكُمْ أَوِ اجْهَرُوا بِهِ ۖ إِنَّهُ عَلِيمٌ بِذَاتِ الصُّدُورِ", english: "And conceal your speech or publicize it; indeed, He is Knowing of that within the breasts.", urdu: "اور تم اپنی بات چھپا کر کہو یا پکار کر، بے شک وہ سینوں کے بھیدوں کو خوب جاننے والا ہے۔" },
            { ayah: 14, startTime: 128, arabic: "أَلَا يَعْلَمُ مَنْ خَلَقَ وَهُوَ اللَّطِيفُ الْخَبِيرُ", english: "Does He who created not know, while He is the Subtle, the Acquainted?", urdu: "کیا وہی نہ جانے گا جس نے پیدا کیا؟ حالانکہ وہ تو بڑا باریک بین، باخبر ہے۔" },
            { ayah: 15, startTime: 134, arabic: "هُوَ الَّذِي جَعَلَ لَكُمُ الْأَرْضَ ذَلُولًا فَامْشُوا فِي مَنَاكِبِهَا وَكُلُوا مِن رِّزْقِهِ ۖ وَإِلَيْهِ النُّشُورُ", english: "It is He who made the earth tame for you - so walk among its slopes and eat of His provision - and to Him is the resurrection.", urdu: "وہی تو ہے جس نے تمہارے لیے زمین کو تابع کر دیا، پس اس کے راستوں میں چلو اور اس کا دیا ہوا رزق کھاؤ، اور اسی کی طرف اٹھ کر جانا ہے۔" },
            { ayah: 16, startTime: 147, arabic: "أَأَمِنتُم مَّن فِي السَّمَاءِ أَن يَخْسِفَ بِكُمُ الْأَرْضَ فَإِذَا هِيَ تَمُورُ", english: "Do you feel secure that He who [holds authority] in the heaven would not cause the earth to swallow you and suddenly it would sway?", urdu: "کیا تم اس سے بے خوف ہو گئے ہو جو آسمان میں ہے کہ وہ تمہیں زمین میں دھنسا دے اور وہ اچانک لرزنے لگے؟" },
            { ayah: 17, startTime: 156, arabic: "أَمْ أَمِنتُم مَّن فِي السَّمَاءِ أَن يُرْسِلَ عَلَيْكُمْ حَاصِبًا ۖ فَسَتَعْلَمُونَ كَيْفَ نَذِيرِ", english: "Or do you feel secure that He who [holds authority] in the heaven would not send against you a storm of stones? Then you would know how [severe] was My warning.", urdu: "یا تم اس سے بے خوف ہو گئے ہو جو آسمان میں ہے کہ وہ تم پر پتھراؤ کرنے والی ہوا بھیج دے؟ پھر تمہیں معلوم ہو جائے گا کہ میرا ڈرانا کیسا ہے۔" },
            { ayah: 18, startTime: 168, arabic: "وَلَقَدْ كَذَّبَ الَّذِينَ مِن قَبْلِهِمْ فَكَيْفَ كَانَ نَكِيرِ", english: "And already had those before them denied, and how [terrible] was My reproach.", urdu: "اور بے شک ان سے پہلے لوگوں نے بھی جھٹلایا تھا، تو میرا عذاب کیسا تھا!" },
            { ayah: 19, startTime: 176, arabic: "أَوَلَمْ يَرَوْا إِلَى الطَّيْرِ فَوْقَهُمْ صَافَّاتٍ وَيَقْبِضْنَ ۚ مَا يُمْسِكُهُنَّ إِلَّا الرَّحْمَٰنُ ۚ إِنَّهُ بِكُلِّ شَيْءٍ بَصِيرٌ", english: "Do they not see the birds above them with wings outspread and [sometimes] folded in? None holds them [aloft] except the Most Merciful. Indeed He is, of all things, Seeing.", urdu: "کیا انہوں نے اپنے اوپر اڑنے والے پرندوں کو نہیں دیکھا جو پر پھیلائے رہتے ہیں اور سکیڑ بھی لیتے ہیں؟ انہیں رحمن کے سوا کوئی نہیں تھامے ہوئے، بے شک وہ ہر چیز کو دیکھنے والا ہے۔" },
            { ayah: 20, startTime: 192, arabic: "أَمَّنْ هَٰذَا الَّذِي هُوَ جُندٌ لَّكُمْ يَنصُرُكُم مِّن دُونِ الرَّحْمَٰنِ ۚ إِنِ الْكَافِرُونَ إِلَّا فِي غُرُورٍ", english: "Or who is it that could be an army for you to aid you other than the Most Merciful? The disbelievers are not but in delusion.", urdu: "بھلا وہ کون ہے جو تمہاری فوج بن کر رحمن کے مقابلے میں تمہاری مدد کرے؟ کافر تو بس دھوکے میں پڑے ہوئے ہیں۔" },
            { ayah: 21, startTime: 205, arabic: "أَمَّنْ هَٰذَا الَّذِي يَرْزُقُكُمْ إِنْ أَمْسَكَ رِزْقَهُ ۚ بَل لَّجُّوا فِي عُتُوٍّ وَنُفُورٍ", english: "Or who is it that could provide for you if He withheld His provision? But they have persisted in insolence and aversion.", urdu: "یا وہ کون ہے جو تمہیں رزق دے اگر وہ اپنا رزق روک لے؟ بلکہ وہ سرکشی اور حق سے نفرت کرنے پر اڑے ہوئے ہیں۔" },
            { ayah: 22, startTime: 218, arabic: "أَفَمَن يَمْشِي مُكِبًّا عَلَىٰ وَجْهِهِ أَهْدَىٰ أَمَّن يَمْشِي سَوِيًّا عَلَىٰ صِرَاطٍ مُّسْتَقِيمٍ", english: "Then is one who walks fallen on his face better guided or one who walks erect on a straight path?", urdu: "تو کیا وہ شخص جو اپنے منہ کے بل اوندھا چلتا ہے وہ زیادہ ہدایت یافتہ ہے، یا وہ جو سیدھے راستے پر سیدھا چلتا ہے؟" },
            { ayah: 23, startTime: 229, arabic: "قُلْ هُوَ الَّذِي أَنشَأَكُمْ وَجَعَلَ لَكُمُ السَّمْعَ وَالْأَبْصَارَ وَالْأَفْئِدَةَ ۖ قَلِيلًا مَّا تَشْكُرُونَ", english: "Say, 'It is He who has produced you and made for you hearing and vision and hearts; little are you grateful.'", urdu: "کہہ دیجئے: وہی ہے جس نے تمہیں پیدا کیا اور تمہارے لیے کان اور آنکھیں اور دل بنائے، تم بہت کم شکر ادا کرتے ہو۔" },
            { ayah: 24, startTime: 242, arabic: "قُلْ هُوَ الَّذِي ذَرَأَكُمْ فِي الْأَرْضِ وَإِلَيْهِ تُحْشَرُونَ", english: "Say, 'It is He who has multiplied you throughout the earth, and to Him you will be gathered.'", urdu: "کہہ دیجئے: وہی ہے جس نے تمہیں زمین میں پھیلا دیا اور اسی کی طرف تم اکٹھے کیے جاؤ گے۔" },
            { ayah: 25, startTime: 250, arabic: "وَيَقُولُونَ مَتَىٰ هَٰذَا الْوَعْدُ إِن كُنتُمْ صَادِقِينَ", english: "And they say, 'When is this promise, if you should be truthful?'", urdu: "اور وہ کہتے ہیں: اگر تم سچے ہو تو یہ وعدہ کب پورا ہوگا؟" },
            { ayah: 26, startTime: 256, arabic: "قُلْ إِنَّمَا الْعِلْمُ عِندَ اللَّهِ وَإِنَّمَا أَنَا نَذِيرٌ مُّبِينٌ", english: "Say, 'The knowledge is only with Allah, and I am only a clear warner.'", urdu: "کہہ دیجئے: اس کا علم تو صرف اللہ کے پاس ہے اور میں تو صرف کھلم کھلا ڈرانے والا ہوں۔" },
            { ayah: 27, startTime: 264, arabic: "فَلَمَّا رَأَوْهُ زُلْفَةً سِيئَتْ وُجُوهُ الَّذِينَ كَفَرُوا وَقِيلَ هَٰذَا الَّذِي كُنتُم بِهِ تَدَّعُونَ", english: "But when they see it approaching, the faces of those who disbelieve will be distressed, and it will be said, 'This is that for which you used to call.'", urdu: "پھر جب وہ اسے قریب دیکھیں گے تو کافروں کے چہرے بگڑ جائیں گے، اور کہا جائے گا: یہی ہے وہ جسے تم مانگا کرتے تھے۔" },
            { ayah: 28, startTime: 280, arabic: "قُلْ أَرَأَيْتُمْ إِنْ أَهْلَكَنِيَ اللَّهُ وَمَن مَّعِيَ أَوْ رَحِمَنَا فَمَن يُجِيرُ الْكَافِرِينَ مِنْ عَذَابٍ أَلِيمٍ", english: "Say, 'Have you considered: whether Allah should cause my death and those with me or have mercy upon us, who can protect the disbelievers from a painful punishment?'", urdu: "کہہ دیجئے: بھلا دیکھو تو اگر اللہ مجھے اور میرے ساتھیوں کو ہلاک کر دے یا ہم پر رحم فرمائے، تو کافروں کو دردناک عذاب سے کون بچائے گا؟" },
            { ayah: 29, startTime: 296, arabic: "قُلْ هُوَ الرَّحْمَٰنُ آمَنَّا بِهِ وَعَلَيْهِ تَوَكَّلْنَا ۖ فَسَتَعْلَمُونَ مَنْ هُوَ فِي ضَلَالٍ مُّبِينٍ", english: "Say, 'He is the Most Merciful; we have believed in Him, and upon Him we have relied. And you will [come to] know who it is that is in clear error.'", urdu: "کہہ دیجئے: وہی رحمن ہے، ہم اس پر ایمان لائے اور اسی پر ہم نے بھروسہ کیا۔ پس تم جلد جان لو گے کہ کھلی گمراہی میں کون ہے۔" },
            { ayah: 30, startTime: 310, arabic: "قُلْ أَرَأَيْتُمْ إِنْ أَصْبَحَ مَاؤُكُمْ غَوْرًا فَمَن يَأْتِيكُم بِمَاءٍ مَّعِينٍ", english: "Say, 'Have you considered: if your water was to become sunken [into the earth], then who could bring you flowing water?'", urdu: "کہہ دیجئے: بھلا دیکھو تو، اگر تمہارا پانی زمین میں خشک ہو جائے تو پھر کون ہے جو تمہارے پاس بہتا ہوا شفاف پانی لائے؟" }
        ];

        const audioPlayer = document.getElementById('quranAudio');
        const ayahNumberEl = document.getElementById('ayahNumber');
        const arabicTextEl = document.getElementById('arabicText');
        const englishTextEl = document.getElementById('englishText');
        const urduTextEl = document.getElementById('urduText');
        const verseContainer = document.getElementById('verse-container');

        let currentAyahIndex = -1;

        function startStream() {
            document.getElementById('interaction-overlay').style.display = 'none';
            audioPlayer.play();
        }

        audioPlayer.addEventListener('timeupdate', () => {
            const currentTime = audioPlayer.currentTime;
            let activeAyah = 0;

            for (let i = 0; i < surahAlMulk.length; i++) {
                if (currentTime >= surahAlMulk[i].startTime) {
                    activeAyah = i;
                }
            }

            if (currentAyahIndex !== activeAyah) {
                currentAyahIndex = activeAyah;
                verseContainer.style.opacity = 0;

                setTimeout(() => {
                    const data = surahAlMulk[activeAyah];
                    ayahNumberEl.innerText = `AYAH ${data.ayah} OF 30`;
                    arabicTextEl.innerText = data.arabic;
                    englishTextEl.innerText = data.english;
                    urduTextEl.innerText = data.urdu;
                    verseContainer.style.opacity = 1;
                }, 400);
            }
        });

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);
    </script>
</body>
</html>
