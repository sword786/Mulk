
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }
  @keyframes spin { to { --angle: 360deg; } }

  .page {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    background: transparent;
  }

  .resize-box {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 136px;
    height: 66px;
    border-radius: 999px;
    background: #ffffff;
    flex-shrink: 0;
  }
  .resize-box::before {
    content: '';
    position: absolute;
    inset: -14px;
    border-radius: 999px;
    background: conic-gradient(from var(--angle), #ff0000, #ff6600, #ffff00, #00ee00, #0099ff, #cc00ff, #ff0099, #ff0000);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    padding: 14px;
    animation: spin 5.0s linear infinite;
    pointer-events: none;
  }
  .sub-text {
    font-family: sans-serif;
    font-weight: 700;
    color: #000000;
    font-size: 24px;
    pointer-events: none;
    white-space: nowrap;
    user-select: none;
  }
</style>

<div class="page">
  <div class="resize-box">
    <span class="sub-text">Subscribe</span>
  </div>
</div>
