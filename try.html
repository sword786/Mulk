<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Mulk - Chat Safe Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;700&family=Inter:wght@400;600&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 1080px; height: 1920px;
            background-color: #04060f; color: #FFFFFF;
            font-family: 'Inter', sans-serif; overflow: hidden;
            position: relative;
        }

        /* Responsive scaling for mobile preview */
        @media (max-width: 1080px) {
            body {
                width: 100vw; height: calc(100vw * (1920/1080));
                font-size: calc(100vw / 1080 * 16px);
            }
        }

        /* Subtle moving background for engagement */
        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, #1a1e2e 0%, #04060f 80%);
            z-index: 1;
        }

        /* SAFE ZONE ADJUSTMENT: We move the content WAY UP */
        .content-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            height: 100%;
            padding: 120px 60px 800px 60px; /* 800px bottom padding to clear chat */
        }

        .header {
            text-align: center; margin-bottom: 60px;
        }

        .live-indicator {
            display: inline-flex; align-items: center; gap: 10px;
            color: #ff4d4d; font-weight: bold; font-size: 24px;
            border: 2px solid #ff4d4d; padding: 5px 15px; border-radius: 10px;
            margin-bottom: 20px;
        }

        .dot { width: 12px; height: 12px; background: #ff4d4d; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .verse-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 60px 40px;
            flex-grow: 1;
            display: flex; flex-direction: column;
            justify-content: center;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .ayah-tag {
            font-family: 'Cinzel'; color: #D4AF37; font-size: 24px;
            letter-spacing: 6px; margin-bottom: 30px;
        }

        .arabic {
            font-family: 'Amiri', serif; font-size: 78px;
            line-height: 1.6; direction: rtl; margin-bottom: 40px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .urdu {
            font-family: 'Noto Nastaliq Urdu', serif; font-size: 40px;
            line-height: 2.2; direction: rtl; color: #e0e0e0;
            margin-bottom: 30px; border-top: 1px solid rgba(212, 175, 55, 0.2); padding-top: 30px;
        }

        .english {
            font-size: 30px; line-height: 1.4; color: #aaa;
            font-style: italic; font-weight: 300;
        }

        /* Overlay for the Start Button */
        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #04060f; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .start-btn {
            background: #D4AF37; border: none; padding: 30px 60px;
            border-radius: 50px; font-size: 40px; font-weight: bold; color: #000;
            cursor: pointer; font-family: 'Cinzel';
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="start()">START STREAM</button>
    </div>

    <div class="bg-layer"></div>

    <audio id="quranAudio" src="surah.m4a" loop></audio>

    <div class="content-wrapper">
        <div class="header">
            <div class="live-indicator"><span class="dot"></span> LIVE</div>
            <h1 style="font-family: 'Cinzel'; font-size: 50px; letter-spacing: 10px; color: #fff;">SURAH AL-MULK</h1>
            <p id="clock" style="color: #D4AF37; font-size: 28px; margin-top: 10px;">00:00:00</p>
        </div>

        <div class="verse-card">
            <div id="ayahNumber" class="ayah-tag">SURAH AL-MULK</div>
            <div id="arabicText" class="arabic">القرآن الكريم</div>
            <div id="urduText" class="urdu">ترجمہ اردو</div>
            <div id="englishText" class="english">Wait for audio to sync...</div>
        </div>

        <!-- The bottom space (800px) is left empty for TikTok/YT Chat & UI -->
    </div>

    <script>
        const surahData = [
            { ayah: 1, startTime: 0, arabic: "تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيرٌ", english: "Blessed is He in whose hand is dominion, and He is over all things competent.", urdu: "بڑی برکت والا ہے وہ جس کے ہاتھ میں بادشاہی ہے اور وہ ہر چیز پر قادر ہے۔" },
            { ayah: 2, startTime: 11, arabic: "الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلًا ۚ وَهُوَ الْعَزِيزُ الْغَفُورُ", english: "[He] who created death and life to test you [as to] which of you is best in deed.", urdu: "جس نے موت اور زندگی کو پیدا کیا تاکہ تمہیں آزمائے کہ تم میں سے کون اچھے عمل کرتا ہے۔" },
            { ayah: 3, startTime: 21, arabic: "الَّذِي خَلَقَ سَبْعَ سَمَاوَاتٍ طِبَاقًا ۖ مَّا تَرَىٰ فِي خَلْقِ الرَّحْمَٰنِ مِن تَفَاوُتٍ ۖ فَارْجِعِ الْبَصَرَ هَلْ تَرَىٰ مِن فُطُورٍ", english: "He who created seven heavens in layers. You do not see any inconsistency in creation.", urdu: "جس نے سات آسمان اوپر تلے بنائے۔ تو رحمن کی پیدائش میں کوئی بے ضابطگی نہیں دیکھے گا۔" },
            { ayah: 4, startTime: 34, arabic: "ثُمَّ ارْجِعِ الْبَصَرَ كَرَّتَيْنِ يَنقَلِبْ إِلَيْكَ الْبَصَرُ خَاسِئًا وَهُوَ حَسِيرٌ", english: "Then return your vision twice again. Your vision will return to you humbled.", urdu: "پھر بار بار نگاہ دوڑا، تیری نگاہ تیری طرف ذلیل و خوار ہو کر لوٹ آئے گی۔" },
            { ayah: 5, startTime: 42, arabic: "وَلَقَدْ زَيَّنَّا السَّمَاءَ الدُّنْيَا بِمَصَابِيحَ وَجَعَلْنَاهَا رُجُومًا لِّلشَّيَاطِينِ ۖ وَأَعْتَدْنَا لَهُمْ عَذَابَ السَّعِيرِ", english: "And We have certainly beautified the nearest heaven with stars.", urdu: "اور ہم نے قریب کے آسمان کو چراغوں (تاروں) سے زینت دی۔" },
            { ayah: 6, startTime: 55, arabic: "وَلِلَّذِينَ كَفَرُوا بِرَبِّهِمْ عَذَابُ جَهَنَّمَ ۖ وَبِئْسَ الْمَصِيرُ", english: "And for those who disbelieved in their Lord is the punishment of Hell.", urdu: "اور جن لوگوں نے اپنے رب کا انکار کیا ان کے لیے جہنم کا عذاب ہے۔" },
            { ayah: 7, startTime: 62, arabic: "إِذَا أُلْقُوا فِيهَا سَمِعُوا لَهَا شَهِيقًا وَهِيَ تَفُورُ", english: "When they are thrown into it, they hear from it a dreadful inhaling.", urdu: "جب وہ اس میں ڈالے جائیں گے تو اس کی چنگھاڑ سنیں گے۔" },
            { ayah: 8, startTime: 68, arabic: "تَكَادُ تَمَيَّزُ مِنَ الْغَيْظِ ۖ كُلَّمَا أُلْقِيَ فِيهَا فَوْجٌ سَأَلَهُمْ خَزَنَتُهَا أَلَمْ يَأْتِكُمْ نَذِيرٌ", english: "It almost bursts with rage. The keepers ask, 'Did no warner come to you?'", urdu: "قریب ہے کہ غصے سے پھٹ جائے۔ کیا تمہارے پاس کوئی ڈرانے والا نہیں آیا تھا؟" },
            { ayah: 9, startTime: 80, arabic: "قَالُوا بَلَىٰ قَدْ جَاءَنَا نَذِيرٌ فَكَذَّبْنَا وَقُلْنَا مَا نَزَّلَ اللَّهُ مِن شَيْءٍ", english: "They will say, 'Yes, a warner had come to us, but we denied.'", urdu: "وہ کہیں گے: کیوں نہیں، بے شک ہمارے پاس ڈرانے والا آیا تھا، لیکن ہم نے جھٹلا دیا۔" },
            { ayah: 10, startTime: 96, arabic: "وَقَالُوا لَوْ كُنَّا نَسْمَعُ أَوْ نَعْقِلُ مَا كُنَّا فِي أَصْحَابِ السَّعِيرِ", english: "If only we had been listening or reasoning, we would not be here.", urdu: "اور کہیں گے: اگر ہم سنتے یا سمجھتے تو ہم اس بھڑکتی آگ والوں میں نہ ہوتے۔" },
            { ayah: 11, startTime: 104, arabic: "فَاعْتَرَفُوا بِذَنبِهِمْ فَسُحْقًا لِّأَصْحَابِ السَّعِيرِ", english: "And they will admit their sin, so dury for the companions of the Blaze.", urdu: "پس وہ اپنے گناہ کا اعتراف کر لیں گے، تو دوری ہے بھڑکتی آگ والوں کے لیے۔" },
            { ayah: 12, startTime: 110, arabic: "إِنَّ الَّذِينَ يَخْشَوْنَ رَبَّهُم بِالْغَيْبِ لَهُم مَّغْفِرَةٌ وَأَجْرٌ كَبِيرٌ", english: "Indeed, those who fear their Lord unseen will have forgiveness.", urdu: "بے شک جو لوگ بن دیکھے اپنے رب سے ڈرتے ہیں، ان کے لیے بخشش ہے۔" },
            { ayah: 13, startTime: 119, arabic: "وَأَسِرُّوا قَوْلَكُمْ أَوِ اجْهَرُوا بِهِ ۖ إِنَّهُ عَلِيمٌ بِذَاتِ الصُّدُورِ", english: "Conceal your speech or publicize it; He knows what is in the breasts.", urdu: "اور تم اپنی بات چھپا کر کہو یا پکار کر، بے شک وہ سینوں کے بھیدوں کو جانتا ہے۔" },
            { ayah: 14, startTime: 128, arabic: "أَلَا يَعْلَمُ مَنْ خَلَقَ وَهُوَ اللَّطِيفُ الْخَبِيرُ", english: "Does He who created not know, while He is the Subtle, the Acquainted?", urdu: "کیا وہی نہ جانے گا جس نے پیدا کیا؟ حالانکہ وہ تو باخبر ہے۔" },
            { ayah: 15, startTime: 134, arabic: "هُوَ الَّذِي جَعَلَ لَكُمُ الْأَرْضَ ذَلُولًا فَامْشُوا فِي مَنَاكِبِهَا وَكُلُوا مِن رِّزْقِهِ", english: "He made the earth tame for you - so walk its slopes and eat His provision.", urdu: "وہی تو ہے جس نے تمہارے لیے زمین کو تابع کر دیا، پس اس کے راستوں میں چلو۔" },
            { ayah: 16, startTime: 147, arabic: "أَأَمِنتُم مَّن فِي السَّمَاءِ أَن يَخْسِفَ بِكُمُ الْأَرْضَ فَإِذَا هِيَ تَمُورُ", english: "Do you feel secure that He would not cause the earth to swallow you?", urdu: "کیا تم اس سے بے خوف ہو گئے ہو جو آسمان میں ہے کہ وہ تمہیں زمین میں دھنسا دے؟" },
            { ayah: 17, startTime: 156, arabic: "أَمْ أَمِنتُم مَّن فِي السَّمَاءِ أَن يُرْسِلَ عَلَيْكُمْ حَاصِبًا ۖ فَسَتَعْلَمُونَ كَيْفَ نَذِيرِ", english: "Or that He would not send against you a storm of stones?", urdu: "یا تم اس سے بے خوف ہو گئے ہو کہ وہ تم پر پتھراؤ کرنے والی ہوا بھیج دے؟" },
            { ayah: 18, startTime: 168, arabic: "وَلَقَدْ كَذَّبَ الَّذِينَ مِن قَبْلِهِمْ فَكَيْفَ كَانَ نَكِيرِ", english: "And already had those before them denied, and how terrible was My reproach.", urdu: "اور بے شک ان سے پہلے لوگوں نے بھی جھٹلایا تھا، تو میرا عذاب کیسا تھا!" },
            { ayah: 19, startTime: 176, arabic: "أَوَلَمْ يَرَوْا إِلَى الطَّيْرِ فَوْقَهُمْ صَافَّاتٍ وَيَقْبِضْنَ", english: "Do they not see the birds above them with wings outspread?", urdu: "کیا انہوں نے اپنے اوپر اڑنے والے پرندوں کو نہیں دیکھا؟" },
            { ayah: 20, startTime: 192, arabic: "أَمَّنْ هَٰذَا الَّذِي هُوَ جُندٌ لَّكُمْ يَنصُرُكُم مِّن دُونِ الرَّحْمَٰنِ", english: "Or who is it that could be an army for you to aid you?", urdu: "بھلا وہ کون ہے جو تمہاری فوج بن کر رحمن کے مقابلے میں مدد کرے؟" },
            { ayah: 21, startTime: 205, arabic: "أَمَّنْ هَٰذَا الَّذِي يَرْزُقُكُمْ إِنْ أَمْسَكَ رِزْقَهُ", english: "Or who is it that could provide for you if He withheld His provision?", urdu: "یا وہ کون ہے جو تمہیں رزق دے اگر وہ اپنا رزق روک لے؟" },
            { ayah: 22, startTime: 218, arabic: "أَفَمَن يَمْشِي مُكِبًّا عَلَىٰ وَجْهِهِ أَهْدَىٰ أَمَّن يَمْشِي سَوِيًّا عَلَىٰ صِرَاطٍ مُّسْتَقِيمٍ", english: "Is one who walks on his face better guided or one who walks erect?", urdu: "تو کیا وہ شخص جو منہ کے بل اوندھا چلتا ہے وہ زیادہ ہدایت یافتہ ہے؟" },
            { ayah: 23, startTime: 229, arabic: "قُلْ هُوَ الَّذِي أَنشَأَكُمْ وَجَعَلَ لَكُمُ السَّمْعَ وَالْأَبْصَارَ وَالْأَفْئِدَةَ", english: "He produced you and made for you hearing, vision and hearts.", urdu: "وہی ہے جس نے تمہیں پیدا کیا اور تمہارے لیے کان، آنکھیں اور دل بنائے۔" },
            { ayah: 24, startTime: 242, arabic: "قُلْ هُوَ الَّذِي ذَرَأَكُمْ فِي الْأَرْضِ وَإِلَيْهِ تُحْشَرُونَ", english: "Say, 'It is He who has multiplied you throughout the earth.'", urdu: "وہی ہے جس نے تمہیں زمین میں پھیلا دیا اور اسی کی طرف تم اکٹھے کیے جاؤ گے۔" },
            { ayah: 25, startTime: 250, arabic: "وَيَقُولُونَ مَتَىٰ هَٰذَا الْوَعْدُ إِن كُنتُمْ صَادِقِينَ", english: "And they say, 'When is this promise, if you are truthful?'", urdu: "اور وہ کہتے ہیں: اگر تم سچے ہو تو یہ وعدہ کب پورا ہوگا؟" },
            { ayah: 26, startTime: 256, arabic: "قُلْ إِنَّمَا الْعِلْمُ عِندَ اللَّهِ وَإِنَّمَا أَنَا نَذِيرٌ مُّبِينٌ", english: "Say, 'The knowledge is only with Allah, I am only a clear warner.'", urdu: "اس کا علم تو صرف اللہ کے پاس ہے اور میں تو صرف ڈرانے والا ہوں۔" },
            { ayah: 27, startTime: 264, arabic: "فَلَمَّا رَأَوْهُ زُلْفَةً سِيئَتْ وُجُوهُ الَّذِينَ كَفَرُوا", english: "When they see it approaching, the faces of disbelievers will be distressed.", urdu: "پھر جب وہ اسے قریب دیکھیں گے تو کافروں کے چہرے بگڑ جائیں گے۔" },
            { ayah: 28, startTime: 280, arabic: "قُلْ أَرَأَيْتُمْ إِنْ أَهْلَكَنِيَ اللَّهُ وَمَن مَّعِيَ أَوْ رَحِمَنَا فَمَن يُجِيرُ الْكَافِرِينَ", english: "Who can protect the disbelievers from a painful punishment?", urdu: "تو کافروں کو دردناک عذاب سے کون بچائے گا؟" },
            { ayah: 29, startTime: 296, arabic: "قُلْ هُوَ الرَّحْمَٰنُ آمَنَّا بِهِ وَعَلَيْهِ تَوَكَّلْنَا", english: "He is the Most Merciful; we have believed in Him.", urdu: "وہی رحمن ہے، ہم اس پر ایمان لائے اور اسی پر ہم نے بھروسہ کیا۔" },
            { ayah: 30, startTime: 310, arabic: "قُلْ أَرَأَيْتُمْ إِنْ أَصْبَحَ مَاؤُكُمْ غَوْرًا فَمَن يَأْتِيكُم بِمَاءٍ مَّعِينٍ", english: "If your water was to become sunken, then who could bring you flowing water?", urdu: "اگر تمہارا پانی خشک ہو جائے تو کون ہے جو بہتا ہوا پانی لائے؟" }
        ];

        const audio = document.getElementById('quranAudio');
        let currentAyah = -1;

        function start() {
            document.getElementById('overlay').style.display = 'none';
            audio.play();
        }

        audio.addEventListener('timeupdate', () => {
            let active = 0;
            for (let i = 0; i < surahData.length; i++) {
                if (audio.currentTime >= surahData[i].startTime) active = i;
            }

            if (currentAyah !== active) {
                currentAyah = active;
                const data = surahData[active];
                
                // Fade transition
                const card = document.querySelector('.verse-card');
                card.style.opacity = 0;
                
                setTimeout(() => {
                    document.getElementById('ayahNumber').innerText = `AYAH ${data.ayah} OF 30`;
                    document.getElementById('arabicText').innerText = data.arabic;
                    document.getElementById('urduText').innerText = data.urdu;
                    document.getElementById('englishText').innerText = data.english;
                    card.style.opacity = 1;
                }, 300);
            }
        });

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);
    </script>
</body>
</html>
